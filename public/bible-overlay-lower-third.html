<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920,height=1080">
  <title>Bible Overlay — Lower Third</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Charis SIL';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('/fonts/charis-sil/CharisSIL-Regular.ttf') format('truetype');
    }

    @font-face {
      font-family: 'Charis SIL';
      font-style: normal;
      font-weight: 700;
      font-display: swap;
      src: url('/fonts/charis-sil/CharisSIL-Bold.ttf') format('truetype');
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    @import url('/fonts/cmg-sans-fonts.css');

    body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
      font-family: var(--font-family, "Charis SIL", "CMG Sans", "Noto Sans", sans-serif);
    }

    /* Hardware acceleration helper */
    .hw {
      transform: translateZ(0);
      backface-visibility: hidden;
    }

    /* Background layer — GPU-accelerated for smooth transitions */
    #background {
      position: absolute;
      inset: 0;
      background-color: var(--bg-color, transparent);
      background-image: var(--bg-image, none);
      background-size: cover;
      background-position: center;
      opacity: var(--bg-opacity, 1);
      z-index: 0;
      transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1),
        filter 0.3s cubic-bezier(0.4, 0, 0.2, 1),
        background-color 0.25s ease;
      will-change: opacity, filter;
      transform: translateZ(0);
    }

    /* Crossfade overlay — holds the OLD background during dissolve transitions */
    #bg-crossfade {
      position: absolute;
      inset: 0;
      z-index: 1;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: opacity;
      transform: translateZ(0);
    }

    #background-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: var(--bg-opacity, 1);
      z-index: 0;
      display: none;
      pointer-events: none;
      transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: opacity;
      transform: translateZ(0);
    }

    #bar-background-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: var(--box-opacity, 1);
      z-index: 0;
      display: none;
      pointer-events: none;
      border-radius: inherit;
      transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: opacity;
      transform: translateZ(0);
    }

    #overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: flex-end;
      justify-content: var(--lt-justify, flex-start);
      padding: 0 var(--safe-area, 40px) var(--safe-area, 40px);
      z-index: 1;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1),
        opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: opacity, transform;
    }

    #overlay.hidden {
      transform: translateY(100%);
      opacity: 0;
    }

    #overlay.blank {
      opacity: 0;
    }

    #bar {
      padding: var(--padding, 30px) calc(var(--padding, 40px) + 20px);
      width: max(480px, calc(100% - var(--lt-width-reduction, 0px)));
      max-width: 100%;
      box-sizing: border-box;
      border-radius: var(--border-radius, 12px);
      /* Lower-third max height — controlled by lowerThirdSize preset */
      max-height: var(--lt-max-height, 486px);
      min-height: var(--lt-min-height, 0px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      position: relative;
      left: var(--lt-offset-x, 0px);
      isolation: isolate;
      transition: left 160ms ease;
    }

    #bar::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background-color: var(--box-background, transparent);
      background-image: var(--box-bg-image, none);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: var(--box-opacity, 1);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      z-index: 0;
    }

    #bar>* {
      position: relative;
      z-index: 1;
    }

    #verse-text {
      font-size: var(--font-size, 36px);
      font-weight: var(--font-weight, normal);
      font-style: var(--font-style, normal);
      color: var(--font-color, #FFFFFF);
      line-height: var(--line-height, 1.5);
      text-shadow: var(--text-shadow, none);
      text-align: var(--text-align, left);
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
      text-transform: var(--text-transform, none);
      width: 100%;
    }

    #reference {
      margin-top: var(--ref-spacing, 12px);
      font-size: var(--ref-font-size, 18px);
      font-weight: var(--ref-font-weight, bold);
      color: var(--ref-font-color, #e0e0e0);
      opacity: var(--ref-opacity, 1);
      letter-spacing: var(--ref-letter-spacing, 0px);
      text-transform: var(--ref-text-transform, none);
      text-align: var(--ref-text-align, inherit);
      display: block;
      width: var(--ref-width, 100%);
      margin-left: auto;
      margin-right: auto;
      overflow-wrap: anywhere;
    }

    #reference.top {
      order: -1;
      margin-top: 0;
      margin-bottom: var(--ref-spacing, 12px);
    }

    #ref-text {
      display: block;
      width: 100%;
      text-align: inherit;
    }

    #logo {
      position: absolute;
      width: var(--logo-size, 60px);
      height: auto;
      opacity: 0.7;
      display: none;
    }

    #logo.visible {
      display: block;
    }

    #logo.top-left {
      top: 20px;
      left: 20px;
    }

    #logo.top-right {
      top: 20px;
      right: 20px;
    }

    #logo.bottom-left {
      bottom: 20px;
      left: 20px;
    }

    #logo.bottom-right {
      bottom: 20px;
      right: 20px;
    }

    /* Animations */
    .anim-slide-up-enter {
      animation: slideUp var(--anim-duration, 400ms) cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .anim-slide-left-enter {
      animation: slideLeft var(--anim-duration, 400ms) cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .anim-fade-enter {
      animation: fadeIn var(--anim-duration, 400ms) cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .anim-scale-in-enter {
      animation: scaleIn var(--anim-duration, 400ms) cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .anim-reveal-bg-enter {
      animation: revealBg var(--bg-enter-duration, 220ms) cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .anim-text-delayed-enter {
      opacity: 0;
      animation: delayedText var(--text-enter-duration, 320ms) cubic-bezier(0.4, 0, 0.2, 1) var(--text-enter-delay, 120ms) forwards;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideLeft {
      from {
        opacity: 0;
        transform: translateX(-26px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.96);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes revealBg {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes delayedText {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div id="background" class="hw"></div>
  <div id="bg-crossfade" class="hw"></div>
  <video id="background-video" muted loop playsinline></video>
  <div id="overlay" class="hidden">
    <div id="bar">
      <video id="bar-background-video" muted loop playsinline></video>
      <div id="verse-text"></div>
      <div id="reference">
        <span id="ref-text"></span>

      </div>
    </div>
  </div>
  <img id="logo" src="" alt="">

  <script>
    /**
     * Bible Overlay — Lower Third
     *
     * Data delivery (in priority order):
     * 1. CSS custom property --overlay-data  (injected by bibleObsService via OBS SetInputSettings)
     * 2. BroadcastChannel  (same-origin popup windows)
     * 3. localStorage polling  (fallback for same-origin contexts)
     *
     * No external WebSocket / HTTP server required.
     */

    const POLL_INTERVAL = 100;
    const FONT_SIZE_MIN = 12;
    const REF_FONT_SIZE_MIN = 10;
    const BAR_PADDING_MIN = 12;
    const BAR_LINE_HEIGHT_MIN = 1.04;

    // ── XSS prevention ────────────────────────────────────────────────────────
    function escapeHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function safeSupText(value) {
      return escapeHtml(value).replace(/\[(\d+)\]\s*/g, '<sup>$1</sup> ');
    }

    // Lower-third size presets — must match LOWER_THIRD_SIZE_PRESETS in types.ts
    const SIZE_PRESETS = {
      smallest: { maxHeight: 180, padding: 14, fontSize: 24, refFontSize: 13, safeArea: 30 },
      smaller: { maxHeight: 240, padding: 20, fontSize: 28, refFontSize: 14, safeArea: 35 },
      small: { maxHeight: 320, padding: 24, fontSize: 32, refFontSize: 16, safeArea: 38 },
      medium: { maxHeight: 400, padding: 30, fontSize: 36, refFontSize: 18, safeArea: 40 },
      big: { maxHeight: 486, padding: 36, fontSize: 42, refFontSize: 20, safeArea: 44 },
      bigger: { maxHeight: 560, padding: 42, fontSize: 48, refFontSize: 22, safeArea: 48 },
      biggest: { maxHeight: 650, padding: 50, fontSize: 56, refFontSize: 26, safeArea: 52 },
    };
    const WIDTH_PRESETS = {
      full: 0,
      sm: 120,
      md: 240,
      lg: 360,
      xl: 520,
      xxl: 680,
    };

    let barMaxHeight = 400; // updated by size preset

    const overlay = document.getElementById('overlay');
    const background = document.getElementById('background');
    const bgCrossfade = document.getElementById('bg-crossfade');
    const backgroundVideoEl = document.getElementById('background-video');
    const barBackgroundVideoEl = document.getElementById('bar-background-video');
    const verseText = document.getElementById('verse-text');
    const refText = document.getElementById('ref-text');
    const logo = document.getElementById('logo');
    const reference = document.getElementById('reference');
    const bar = document.getElementById('bar');

    let currentSlideId = null;
    let lastTimestamp = 0;
    let baseFontSize = 36; // set by theme
    let baseRefFontSize = 18;
    let hasShownOnce = false;  // Track first show vs subsequent verse changes
    let lastCssOverlayData = '';
    let baseBarPadding = 30;
    let fitRafId = 0;

    // ── Crossfade dissolve state ──
    let lastBgFingerprint = '';
    let bgTransitionSuppressed = false;
    let bgClearToken = 0;
    let lastAnimation = 'slide-up';
    let contentFadeLock = false;

    function toCssFontWeight(weight, fallback) {
      if (weight === "light") return "300";
      if (weight === "bold") return "700";
      if (weight === "normal") return "400";
      const asString = String(weight || "").trim();
      if (/^\d{3}$/.test(asString)) return asString;
      return fallback;
    }

    function ensureCmgSansFont(fontFamily) {
      const raw = String(fontFamily || "").trim();
      // Ensure Charis SIL is always present for Unicode/African language support
      const hasCharis = /charis\s*sil/i.test(raw);
      if (/cmg\s*sans/i.test(raw)) {
        // Ensure Unicode fallbacks are present after CMG Sans
        const base = hasCharis ? raw : raw.replace(/,\s*sans-serif\s*$/i, '') + ', "Charis SIL"';
        if (/noto\s*sans/i.test(base)) return base;
        return base.replace(/,\s*sans-serif\s*$/i, '') + ', "Noto Sans", sans-serif';
      }
      return hasCharis ? raw : '"Charis SIL", "CMG Sans", "Noto Sans", sans-serif';
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function applyTheme(theme) {
      if (!theme) return;
      const s = theme;
      const root = document.documentElement.style;

      // ── Apply lower-third size preset if specified ──
      const sizeKey = s.lowerThirdSize || 'medium';
      const preset = SIZE_PRESETS[sizeKey] || SIZE_PRESETS.medium;
      barMaxHeight = preset.maxHeight;
      root.setProperty('--lt-max-height', preset.maxHeight + 'px');

      // Use preset values as defaults — explicit theme values override
      const effectiveFontSize = s.fontSize || preset.fontSize;
      const effectiveRefFontSize = s.refFontSize || preset.refFontSize;
      const effectivePadding = s.padding || preset.padding;
      const effectiveSafeArea = s.safeArea || preset.safeArea;
      const widthReduction = WIDTH_PRESETS[s.lowerThirdWidthPreset || 'full'] || 0;
      const paddedWidth = Math.max(480, 1920 - effectiveSafeArea * 2);
      const safeWidthReduction = clamp(widthReduction, 0, Math.max(0, paddedWidth - 480));
      const freeSpace = safeWidthReduction;
      let minOffset = 0;
      let maxOffset = 0;

      if (s.lowerThirdPosition === 'center') {
        minOffset = -freeSpace / 2;
        maxOffset = freeSpace / 2;
      } else if (s.lowerThirdPosition === 'right') {
        minOffset = -freeSpace;
        maxOffset = 0;
      } else {
        minOffset = 0;
        maxOffset = freeSpace;
      }

      const safeOffset = Math.round(clamp(Number(s.lowerThirdOffsetX) || 0, minOffset, maxOffset));

      root.setProperty('--font-family', ensureCmgSansFont(s.fontFamily));
      baseFontSize = effectiveFontSize;
      root.setProperty('--font-size', baseFontSize + 'px');
      root.setProperty('--font-weight', toCssFontWeight(s.fontWeight, "400"));
      root.setProperty('--font-style', s.fontStyle === 'italic' ? 'italic' : 'normal');
      root.setProperty('--font-color', s.fontColor || '#FFFFFF');
      root.setProperty('--line-height', String(s.lineHeight || 1.5));
      root.setProperty('--text-align', s.textAlign || 'left');
      root.setProperty('--text-shadow', s.textShadow || 'none');

      baseRefFontSize = effectiveRefFontSize;
      root.setProperty('--ref-font-size', effectiveRefFontSize + 'px');
      root.setProperty('--ref-font-weight', toCssFontWeight(s.refFontWeight, "700"));
      root.setProperty('--ref-font-color', s.refFontColor || '#e0e0e0');
      root.setProperty('--ref-text-transform', s.refTextTransform || 'none');
      root.setProperty('--ref-letter-spacing', (s.refLetterSpacing || 0) + 'px');
      root.setProperty('--ref-opacity', String(s.refOpacity ?? 1));
      root.setProperty('--ref-spacing', (s.refSpacing ?? 12) + 'px');
      if (s.refTextAlign && s.refTextAlign !== 'match') {
        root.setProperty('--ref-text-align', s.refTextAlign);
      } else {
        root.removeProperty('--ref-text-align');
      }

      root.setProperty('--box-background', s.boxBackground || 'transparent');
      root.setProperty('--box-opacity', String(s.boxOpacity ?? 1));
      root.setProperty('--border-radius', (s.borderRadius || 12) + 'px');
      baseBarPadding = effectivePadding;
      root.setProperty('--padding', effectivePadding + 'px');
      root.setProperty('--safe-area', effectiveSafeArea + 'px');
      const effectiveAnimDuration = Math.max(95, Math.min(170, Math.round((s.animationDuration || 400) * 0.38)));
      root.setProperty('--anim-duration', effectiveAnimDuration + 'ms');
      root.setProperty('--bg-enter-duration', Math.max(70, Math.round(effectiveAnimDuration * 0.42)) + 'ms');
      root.setProperty('--text-enter-duration', Math.max(82, Math.round(effectiveAnimDuration * 0.54)) + 'ms');
      root.setProperty('--text-enter-delay', Math.max(12, Math.round(effectiveAnimDuration * 0.08)) + 'ms');
      root.setProperty('--lt-justify',
        s.lowerThirdPosition === 'center'
          ? 'center'
          : s.lowerThirdPosition === 'right'
            ? 'flex-end'
            : 'flex-start'
      );
      root.setProperty('--lt-width-reduction', safeWidthReduction + 'px');
      root.setProperty('--lt-offset-x', safeOffset + 'px');
      root.setProperty('--lt-min-height', Math.max(0, Number(s.lowerThirdHeight) || 0) + 'px');

      // Text transform
      root.setProperty('--text-transform', s.textTransform || 'none');

      // Lower-third card background. Keep the outer canvas transparent and
      // paint the theme on the bar itself.
      const bgGradientAngle = s.bgGradientAngle ?? 135;
      const bgGradientEnd = s.backgroundColorEnd || '';
      const hasGradient = bgGradientEnd && bgGradientEnd !== s.backgroundColor;
      const bgColorSolid = s.backgroundColor || 'transparent';
      const bgColorFinal = hasGradient
        ? `linear-gradient(${bgGradientAngle}deg, ${bgColorSolid}, ${bgGradientEnd})`
        : bgColorSolid;
      const bgOpacity = String(s.backgroundOpacity ?? 1);
      const bgVideoUrl = String(s.backgroundVideo || '').trim();

      // Outer canvas stays transparent in lower-third mode.
      root.setProperty('--bg-opacity', '1');
      root.setProperty('--bg-image', 'none');
      root.setProperty('--bg-color', 'transparent');
      if (backgroundVideoEl.getAttribute('src')) {
        backgroundVideoEl.pause();
        backgroundVideoEl.removeAttribute('src');
        backgroundVideoEl.load();
      }
      backgroundVideoEl.style.display = 'none';
      if (bgCrossfade) {
        bgCrossfade.style.opacity = '0';
      }

      // Determine the card background. Use the selected theme background first.
      const bgImageValue = String(s.backgroundImage || '').trim();
      const bgImageFilePath = String(s.backgroundImageFilePath || '').trim();
      const boxImageValue = String(s.boxBackgroundImage || '').trim();
      const boxBackgroundValue = String(s.boxBackground || '').trim();
      if (bgVideoUrl) {
        root.setProperty('--box-background', 'transparent');
        root.setProperty('--box-bg-image', 'none');
        root.setProperty('--box-opacity', bgOpacity);
        if (barBackgroundVideoEl) {
          barBackgroundVideoEl.style.display = 'block';
          if (barBackgroundVideoEl.getAttribute('src') !== bgVideoUrl) {
            barBackgroundVideoEl.src = bgVideoUrl;
            barBackgroundVideoEl.style.opacity = '0';
            barBackgroundVideoEl.addEventListener('canplay', function onCanPlay() {
              barBackgroundVideoEl.removeEventListener('canplay', onCanPlay);
              barBackgroundVideoEl.style.transition = 'opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1)';
              barBackgroundVideoEl.style.opacity = bgOpacity;
            }, { once: true });
          }
          const playPromise = barBackgroundVideoEl.play();
          if (playPromise && typeof playPromise.catch === 'function') {
            playPromise.catch(() => { });
          }
        }
      } else {
        if (barBackgroundVideoEl) {
          if (barBackgroundVideoEl.getAttribute('src')) {
            barBackgroundVideoEl.pause();
            barBackgroundVideoEl.removeAttribute('src');
            barBackgroundVideoEl.load();
          }
          barBackgroundVideoEl.style.display = 'none';
        }

        let resolvedBgImage = boxImageValue;
        if (!resolvedBgImage && bgImageValue) {
          resolvedBgImage = bgImageValue;
        }
        if (resolvedBgImage === '__FROM_CSS__') {
          const cssVal = getComputedStyle(document.documentElement).getPropertyValue('--bg-image').trim();
          resolvedBgImage = cssVal || '';
        } else if (resolvedBgImage === '__FROM_LOCALSTORAGE__') {
          const stored = localStorage.getItem('bible-overlay-bg-image');
          resolvedBgImage = stored || '';
        }

        if (resolvedBgImage) {
          root.setProperty('--box-bg-image', resolvedBgImage.startsWith('url(') ? resolvedBgImage : `url(${resolvedBgImage})`);
          root.setProperty('--box-background', hasGradient ? bgColorFinal : (bgColorSolid && bgColorSolid !== 'transparent' ? bgColorSolid : (boxBackgroundValue || 'transparent')));
        } else if (hasGradient) {
          // Gradients must go through --box-bg-image (background-image) since
          // --box-background only controls background-color and gradients are
          // not valid CSS for background-color.
          root.setProperty('--box-bg-image', bgColorFinal);
          root.setProperty('--box-background', 'transparent');
        } else {
          root.setProperty('--box-bg-image', 'none');
          root.setProperty('--box-background', bgColorSolid && bgColorSolid !== 'transparent' ? bgColorSolid : (boxBackgroundValue || 'transparent'));
        }
        root.setProperty('--box-opacity', bgOpacity);
      }

      if (s.refPosition === 'top') {
        reference.classList.add('top');
      } else {
        reference.classList.remove('top');
      }

      if (s.logoUrl) {
        if (s.logoUrl === '__FROM_CSS__') {
          const cssVal = getComputedStyle(document.documentElement).getPropertyValue('--logo-data-uri').trim();
          if (cssVal && cssVal.startsWith('url(')) {
            const inner = cssVal.slice(4, -1).replace(/^["']|["']$/g, '');
            logo.src = inner;
          }
        } else {
          logo.src = s.logoUrl;
        }
        logo.className = 'visible ' + (s.logoPosition || 'bottom-right');
        root.setProperty('--logo-size', (s.logoSize || 60) + 'px');
      } else {
        logo.className = '';
      }
    }

    function resolveSafeArea() {
      const raw = getComputedStyle(document.documentElement)
        .getPropertyValue("--safe-area")
        .trim()
        .replace("px", "");
      return Number(raw) || 40;
    }

    function isOverflowing(node, width, height) {
      if (!node) return false;
      const epsilon = 1;
      const measuredWidth = Math.max(node.scrollWidth, node.getBoundingClientRect().width);
      const measuredHeight = Math.max(node.scrollHeight, node.getBoundingClientRect().height);
      return measuredWidth > width + epsilon || measuredHeight > height + epsilon;
    }

    function isLowerThirdOverflowing() {
      if (!bar) return false;
      const safeArea = resolveSafeArea();
      const viewportWidth = document.body?.clientWidth || 1920;
      const viewportHeight = document.body?.clientHeight || 1080;
      const availableWidth = Math.max(320, viewportWidth - safeArea * 2);
      const availableHeight = Math.max(120, Math.min(barMaxHeight, viewportHeight - safeArea * 2));
      return (
        isOverflowing(bar, availableWidth, availableHeight) ||
        isOverflowing(verseText, verseText.clientWidth || availableWidth, availableHeight) ||
        (reference.style.display !== "none" && isOverflowing(reference, reference.clientWidth || availableWidth, availableHeight))
      );
    }

    /**
     * Auto-scale font size down so the bar never exceeds the visible OBS frame.
     * Starts from the theme's baseFontSize and steps down until both height and width fit.
     */
    function autoScaleFont() {
      if (!bar) return;
      let size = baseFontSize;
      let refSize = Math.max(REF_FONT_SIZE_MIN, Math.round(baseRefFontSize));
      let padding = Math.max(BAR_PADDING_MIN, Math.round(baseBarPadding));
      let lineHeight = Math.max(BAR_LINE_HEIGHT_MIN, Number(getComputedStyle(document.documentElement).getPropertyValue("--line-height")) || 1.5);
      let referenceSpacing = 12;
      const ratio = baseFontSize > 0 ? (baseRefFontSize / baseFontSize) : 0.5;
      verseText.style.fontSize = size + 'px';
      reference.style.fontSize = refSize + 'px';
      verseText.style.lineHeight = String(lineHeight);
      bar.style.padding = padding + 'px calc(' + padding + 'px + 20px)';
      reference.style.marginTop = reference.classList.contains("top") ? "0px" : referenceSpacing + "px";
      reference.style.marginBottom = reference.classList.contains("top") ? referenceSpacing + "px" : "0px";
      // Measure after setting — allow reflow
      let guard = 0;
      while (
        isLowerThirdOverflowing() &&
        (
          size > FONT_SIZE_MIN ||
          refSize > REF_FONT_SIZE_MIN ||
          padding > BAR_PADDING_MIN ||
          lineHeight > BAR_LINE_HEIGHT_MIN ||
          referenceSpacing > 6
        ) &&
        guard < 240
      ) {
        if (size > FONT_SIZE_MIN) {
          size -= 1;
        }
        refSize = Math.max(REF_FONT_SIZE_MIN, Math.round(size * ratio));
        if (isLowerThirdOverflowing() && padding > BAR_PADDING_MIN) {
          padding = Math.max(BAR_PADDING_MIN, padding - 1);
        }
        if (isLowerThirdOverflowing() && lineHeight > BAR_LINE_HEIGHT_MIN) {
          lineHeight = Math.max(BAR_LINE_HEIGHT_MIN, Number((lineHeight - 0.02).toFixed(2)));
        }
        if (isLowerThirdOverflowing() && referenceSpacing > 6) {
          referenceSpacing = Math.max(6, referenceSpacing - 1);
        }
        verseText.style.fontSize = size + 'px';
        reference.style.fontSize = refSize + 'px';
        verseText.style.lineHeight = String(lineHeight);
        bar.style.padding = padding + 'px calc(' + padding + 'px + 20px)';
        reference.style.marginTop = reference.classList.contains("top") ? "0px" : referenceSpacing + "px";
        reference.style.marginBottom = reference.classList.contains("top") ? referenceSpacing + "px" : "0px";
        guard += 1;
      }
    }

    function scheduleAutoScaleFont() {
      if (fitRafId) {
        cancelAnimationFrame(fitRafId);
      }
      fitRafId = requestAnimationFrame(() => {
        fitRafId = 0;
        autoScaleFont();
      });
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(() => {
          requestAnimationFrame(() => autoScaleFont());
        }).catch(() => { });
      }
    }

    function clearEntranceAnimationClasses() {
      bar.classList.remove('anim-slide-up-enter', 'anim-slide-left-enter', 'anim-fade-enter', 'anim-scale-in-enter', 'anim-reveal-bg-enter');
      verseText.classList.remove('anim-text-delayed-enter');
      reference.classList.remove('anim-text-delayed-enter');
    }

    function runEntranceAnimation(anim) {
      clearEntranceAnimationClasses();
      void bar.offsetWidth;

      if (anim === 'none') return;

      if (anim === 'reveal-bg-then-text') {
        bar.classList.add('anim-reveal-bg-enter');
        verseText.classList.add('anim-text-delayed-enter');
        reference.classList.add('anim-text-delayed-enter');
        return;
      }

      if (anim === 'fade') {
        bar.classList.add('anim-fade-enter');
        return;
      }

      if (anim === 'scale-in') {
        bar.classList.add('anim-scale-in-enter');
        return;
      }

      if (anim === 'slide-left') {
        bar.classList.add('anim-slide-left-enter');
        return;
      }

      bar.classList.add('anim-slide-up-enter');
    }

    /* ── Animate-out completion signaling ── */
    let _animateOutResolve = null;
    overlay.addEventListener('transitionend', (e) => {
      if (e.propertyName === 'opacity' && overlay.classList.contains('blank')) {
        overlay.classList.add('hidden');
        signalAnimateOutComplete();
      }
    });

    function signalAnimateOutComplete() {
      if (_animateOutResolve) {
        _animateOutResolve();
        _animateOutResolve = null;
      }
      try {
        const bc = new BroadcastChannel(_channelName);
        bc.postMessage({ type: 'lower-third-animation-complete' });
        bc.close();
      } catch { }
    }

    function applySlide(data) {
      if (!data) return;
      // De-duplicate by timestamp
      if (data.timestamp && data.timestamp <= lastTimestamp) return;
      lastTimestamp = data.timestamp || 0;

      /* ── Animate out: play exit then signal completion ── */
      if (data.action === 'animate-out') {
        overlay.classList.remove('hidden');
        overlay.classList.add('blank');
        // Return a promise the host can await
        return new Promise((resolve) => { _animateOutResolve = resolve; });
      }

      if (!data.slide) {
        // ── Smooth clear: fade out gracefully, cancel any pending clear ──
        bgClearToken++;
        overlay.classList.add('blank');
        const token = bgClearToken;
        setTimeout(() => {
          if (token === bgClearToken) {
            overlay.classList.add('hidden');
            currentSlideId = null;
            hasShownOnce = false;
          }
        }, 280);
        return;
      }

      // Cancel any pending clear from a previous empty slide
      bgClearToken++;

      const slide = data.slide;
      const isNew = slide.id !== currentSlideId;
      const isSameVerse = slide.id === currentSlideId && !isNew;
      currentSlideId = slide.id;

      if (data.theme) applyTheme(data.theme);

      if (data.blanked) {
        overlay.classList.add('blank');
        return;
      } else {
        overlay.classList.remove('blank');
      }

      // Always show the overlay when we have a slide — the dock/app controls
      // visibility via OBS scene item enabled state, not via this flag.
      overlay.classList.remove('hidden');

      const displayText = safeSupText(slide.text);
      verseText.innerHTML = displayText;
      const referenceText = typeof slide.reference === "string" ? slide.reference.trim() : "";
      refText.textContent = referenceText;
      reference.style.display = referenceText ? "block" : "none";

      // Auto-scale: shrink font so bar stays within max height
      scheduleAutoScaleFont();

      const anim = data.theme?.animation || 'slide-up';
      lastAnimation = anim;

      if (isNew) {
        // First show — run entrance animation from start
        if (!hasShownOnce) {
          hasShownOnce = true;
          runEntranceAnimation(anim);
        }
      } else if (isSameVerse) {
        // Re-render of same verse — re-sync animation to avoid visual restart
        if (anim !== 'none' && hasShownOnce && !contentFadeLock) {
          clearEntranceAnimationClasses();
          void bar.offsetWidth;
          const effectiveDur = Math.max(95, Math.min(170, Math.round((data.theme?.animationDuration || 400) * 0.38)));
          const elapsed = Date.now() % effectiveDur;
          const delay = -(elapsed);
          if (anim === 'fade') {
            bar.style.animationDelay = delay + 'ms';
            bar.classList.add('anim-fade-enter');
          } else if (anim === 'slide-up') {
            bar.style.animationDelay = delay + 'ms';
            bar.classList.add('anim-slide-up-enter');
          } else if (anim === 'slide-left') {
            bar.style.animationDelay = delay + 'ms';
            bar.classList.add('anim-slide-left-enter');
          } else if (anim === 'scale-in') {
            bar.style.animationDelay = delay + 'ms';
            bar.classList.add('anim-scale-in-enter');
          }
          setTimeout(() => { bar.style.animationDelay = ''; }, effectiveDur + 50);
        }
      }
    }

    function readFromCssVar() {
      try {
        const raw = getComputedStyle(document.documentElement).getPropertyValue('--overlay-data').trim();
        if (!raw || raw === lastCssOverlayData) return false;
        lastCssOverlayData = raw;
        const normalized = raw.replace(/^['"]|['"]$/g, '');
        if (!normalized) return false;
        const data = JSON.parse(decodeURIComponent(normalized));
        applySlide(data);
        return true;
      } catch { /* parse error */ }
      return false;
    }

    // --- Method 1: Read from URL hash (OBS updates URL via SetInputSettings) ---
    function readFromUrlHash() {
      try {
        const hash = window.location.hash;
        if (hash && hash.startsWith('#data=')) {
          const encoded = hash.slice(6); // remove '#data='
          const data = JSON.parse(decodeURIComponent(encoded));
          applySlide(data);
          return true;
        }
      } catch { /* parse error */ }
      return false;
    }

    // --- Determine tab-specific data channel from URL query param ---
    const _tabParam = new URLSearchParams(window.location.search).get('tab') || 'bible';
    const _storageKey = _tabParam === 'worship' ? 'worship-overlay-data' : 'bible-overlay-data';
    const _channelName = _tabParam === 'worship' ? 'obs-church-studio-worship-overlay' : 'obs-church-studio-bible-overlay';

    // --- Method 2: BroadcastChannel (same-origin windows) ---
    try {
      const bc = new BroadcastChannel(_channelName);
      bc.onmessage = (e) => {
        applySlide(e.data);
      };
    } catch { /* not supported */ }

    // Listen for animate-out commands from the host
    window.addEventListener('message', (e) => {
      if (e.data && e.data.action === 'animate-out') {
        applySlide(e.data);
      }
    });

    // --- Method 3: localStorage polling (same-origin fallback) ---
    function readFromLocalStorage() {
      try {
        const raw = localStorage.getItem(_storageKey);
        if (raw) {
          const data = JSON.parse(raw);
          applySlide(data);
          return true;
        }
      } catch { /* parse error */ }
      return false;
    }

    // --- hashchange listener: OBS updates the URL hash without reloading ---
    // This is the primary update path. When bibleObsService calls SetInputSettings
    // with only the hash fragment changed, OBS/CEF fires hashchange instead of
    // reloading the page. The background stays static and only text updates.
    window.addEventListener('hashchange', () => {
      readFromUrlHash();
    });

    // --- Unified polling loop ---
    setInterval(() => {
      // Try URL hash first (OBS), then localStorage (same-origin)
      if (!readFromCssVar() && !readFromUrlHash()) {
        readFromLocalStorage();
      }
    }, POLL_INTERVAL);

    if (window.ResizeObserver) {
      const resizeObserver = new ResizeObserver(() => {
        scheduleAutoScaleFont();
      });
      resizeObserver.observe(document.body);
      resizeObserver.observe(bar);
    }

    // Initial read
    readFromCssVar() || readFromUrlHash() || readFromLocalStorage();
  </script>
</body>

</html>
