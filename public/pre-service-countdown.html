<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pre-Service Countdown</title>
  <style>
    @import url('/fonts/cmg-sans-fonts.css');

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b120e;
      color: #f4f4f4;
      font-family: "CMG Sans", sans-serif;
    }

    body.theme-classic {
      background: #0b120e;
      color: #f4f4f4;
    }

    body.theme-minimal {
      background: #ffffff;
      color: #0f172a;
    }

    body.theme-spotlight {
      background: radial-gradient(circle at center, #0f2f1d 0%, #07120c 70%, #030705 100%);
      color: #ecfdf3;
    }

    body.theme-bold {
      background: linear-gradient(120deg, #072012 0%, #0c2f1a 35%, #05140d 100%);
      color: #ffffff;
    }

    .wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
    }

    .countdown-fit {
      max-width: calc(100vw - 48px);
      max-height: calc(100vh - 48px);
      transform-origin: center center;
      will-change: transform;
    }

    .label {
      font-size: 20px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #00e676;
      font-weight: 700;
    }

    body.theme-minimal .label {
      color: #0f8a4a;
    }

    body.theme-bold .label {
      color: #a7f3d0;
    }

    .timer {
      font-family: "CMG Sans", sans-serif;
      font-size: 140px;
      font-weight: 700;
      letter-spacing: 0.02em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .sub {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #98a19b;
    }

    body.theme-minimal .sub {
      color: #475569;
    }

    body.theme-bold .sub {
      color: #bbf7d0;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div id="fit" class="countdown-fit">
      <div id="label" class="label">Service Starts In</div>
      <div id="timer" class="timer">10:00</div>
      <div class="sub">Minutes : Seconds</div>
    </div>
  </div>

  <script>
    let timerId = null;
    const fit = document.getElementById("fit");

    function fitCountdown() {
      if (!fit) return;
      fit.style.transform = "scale(1)";
      const rect = fit.getBoundingClientRect();
      if (!rect.width || !rect.height) return;
      const availableWidth = Math.max(240, window.innerWidth - 48);
      const availableHeight = Math.max(180, window.innerHeight - 48);
      const scale = Math.min(1, availableWidth / rect.width, availableHeight / rect.height);
      fit.style.transform = scale < 0.999 ? `scale(${scale.toFixed(4)})` : "scale(1)";
    }

    function scheduleCountdownFit() {
      requestAnimationFrame(() => fitCountdown());
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(() => requestAnimationFrame(() => fitCountdown())).catch(() => {});
      }
    }

    function parsePayload() {
      try {
        const hash = window.location.hash || "";
        const encoded = hash.startsWith("#data=") ? hash.slice(6) : "";
        if (!encoded) return null;
        return JSON.parse(decodeURIComponent(encoded));
      } catch {
        return null;
      }
    }

    function format(seconds) {
      const safe = Math.max(0, Math.floor(seconds));
      const m = Math.floor(safe / 60);
      const s = safe % 60;
      return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
    }

    function applyPayload() {
      if (timerId) {
        clearInterval(timerId);
        timerId = null;
      }

      const data = parsePayload();
      const total = Number(data && data.seconds);
      const label = data && typeof data.label === "string" ? data.label : "Service Starts In";
      const themeRaw = data && typeof data.theme === "string" ? data.theme : "classic";
      const allowedThemes = ["classic", "minimal", "spotlight", "bold"];
      const theme = allowedThemes.includes(themeRaw) ? themeRaw : "classic";

      const labelEl = document.getElementById("label");
      const timerEl = document.getElementById("timer");

      document.body.classList.remove("theme-classic", "theme-minimal", "theme-spotlight", "theme-bold");
      document.body.classList.add(`theme-${theme}`);
      labelEl.textContent = label;

      if (!Number.isFinite(total) || total <= 0) {
        timerEl.textContent = "00:00";
        return;
      }

      const startedAt = Date.now();

      function render() {
        const elapsed = Math.floor((Date.now() - startedAt) / 1000);
        const remaining = Math.max(0, total - elapsed);
        timerEl.textContent = format(remaining);
        scheduleCountdownFit();
        if (remaining <= 0 && timerId) {
          clearInterval(timerId);
          timerId = null;
        }
      }

      render();
      timerId = setInterval(render, 250);
      scheduleCountdownFit();
    }

    window.addEventListener("hashchange", applyPayload);
    window.addEventListener("resize", scheduleCountdownFit);
    applyPayload();
  </script>
</body>

</html>
